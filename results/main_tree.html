<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Call Tree - main</title>
    <style>
        .node circle { fill: #fff; stroke: steelblue; stroke-width: 3px; }
        .node text { font: 12px sans-serif; }
        .link { fill: none; stroke: #ccc; stroke-width: 2px; }
        .tooltip { position: absolute; background: #fff; border: 1px solid #ccc; padding: 5px; border-radius: 5px; font-size: 12px; pointer-events: none; opacity: 0; }
    </style>
</head>
<body>
    <h1>Call Tree from main</h1>
    <div id="tree-container" style="width:100%; height:800px; overflow:auto; border:1px solid #ccc;"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        const treeData = {
  "name": "main",
  "file": "/home/pc/data/cjq/CodeMap/complex_test_pro/main.py",
  "line": 0,
  "children": []
};

        // Set dimensions and margins
        const width = 1200;
        const height = 800;
        const margin = { top: 20, right: 120, bottom: 20, left: 120 };
        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;

        const svg = d3.select("#tree-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        // Create a tree layout
        const root = d3.hierarchy(treeData);
        const treeLayout = d3.tree().size([innerHeight, innerWidth]);
        treeLayout(root);

        // Add links
        svg.selectAll(".link")
            .data(root.links())
            .enter()
            .append("path")
            .attr("class", "link")
            .attr("d", d3.linkHorizontal()
                .x(d => d.y)
                .y(d => d.x)
            );

        // Add nodes
        const nodes = svg.selectAll(".node")
            .data(root.descendants())
            .enter()
            .append("g")
            .attr("class", "node")
            .attr("transform", d => `translate(${d.y},${d.x})`);

        nodes.append("circle")
            .attr("r", 8);

        nodes.append("text")
            .attr("dy", ".35em")
            .attr("x", d => d.children ? -12 : 12)
            .style("text-anchor", d => d.children ? "end" : "start")
            .text(d => d.data.name);

        // Tooltip on hover
        const tooltip = d3.select("body").append("div").attr("class", "tooltip");
        nodes.on("mouseover", function(event, d) {
            tooltip.style("opacity", 1)
                .html(`<strong>${d.data.name}</strong><br/>File: ${d.data.file || "unknown"}<br/>Line: ${d.data.line || "?"}`)
                .style("left", (event.pageX + 10) + "px")
                .style("top", (event.pageY - 20) + "px");
        }).on("mouseout", function() {
            tooltip.style("opacity", 0);
        });
    </script>
</body>
</html>
